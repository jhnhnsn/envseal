[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Where installers place the binary. ~/.local/bin is the XDG standard user-binary dir and is
# Rust-agnostic — our target user (a teammate onboarding to a repo) may not have a Rust
# toolchain or ~/.cargo. The installer adds this dir to PATH via the user's profile.
install-path = "~/.local/bin"
# Whether to install an updater program
install-updater = false
# Printed after a successful install. The installer edits shell rc files so NEW shells find
# envstow, but the CURRENT shell won't until it's reloaded — call that out so nobody thinks
# the install failed when `envstow` isn't found in the same terminal.
install-success-msg = "envstow installed. Open a NEW terminal (or run: source ~/.local/bin/env), then check it with: envstow --version"
