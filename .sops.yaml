# SOPS recipient list — who can decrypt secrets/*.enc.env
#
# Each teammate generates an age keypair (see README §2) and sends you their
# PUBLIC key (age1...). Add it below, then run:  sops updatekeys secrets/secrets.enc.env
#
# Removing a key stops FUTURE access only — rotate the actual secrets to truly revoke.
creation_rules:
  - path_regex: secrets/.*\.enc\.env$
    key_groups:
      - age:
          # - age1alice...        # Alice
          # - age1bob...          # Bob
          # - age1ci...           # CI runner (dedicated key, stored as CI secret)
          - REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
    # For AWS deploys you can add a kms: block so IAM roles decrypt without a stored key:
    #   kms:
    #     - arn: arn:aws:kms:us-east-1:111122223333:key/abcd-...
