[package]
name = "envseal"
version = "0.1.3"
edition = "2021"
description = "An age-encrypted key-value secret store, committed to your repo and surfaced by name."
license = "MIT"
repository = "https://github.com/jhnhnsn/envseal"

[[bin]]
name = "envseal"
path = "src/main.rs"

[dependencies]
zeroize = "1"
age = "0.11"
base64 = "0.21"

[profile.release]
strip = true
lto = true
opt-level = "z"
