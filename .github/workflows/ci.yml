name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  launcher:
    name: launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: crates/envstow
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: build (release)
        run: cargo build --release

      # Verify the Windows examples in the README actually work: a PowerShell pipe into
      # `set`, then read the value back. Guards against PowerShell stdin/newline quirks
      # silently corrupting a stored secret, and confirms the agent-mask fires on Windows.
      - name: windows smoke (powershell examples)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: crates/envstow
        run: |
          $env:ENVSTOW_IDENTITY = Join-Path $env:RUNNER_TEMP 'envstow-id.txt'
          # Workspace target dir is at the repo root, TWO levels up from this job's cwd (crates/envstow/).
          $bin = '..\..\target\release\envstow.exe'
          $expected = 'sk-windows-CI-value'

          & $bin init
          if ($LASTEXITCODE -ne 0) { throw 'init failed' }

          # Pipe a value into `set` (the README's Windows example), then read it back with
          # `get --show` and assert an exact round-trip — no nested shell, no quoting games.
          $expected | & $bin set OPENAI_API_KEY
          if ($LASTEXITCODE -ne 0) { throw 'set failed' }
          $got = (& $bin get OPENAI_API_KEY --show).Trim()
          if ($got -ne $expected) { throw "round-trip mismatch: got [$got], expected [$expected]" }

          # Under an agent, `get` must NOT reveal the value.
          $env:ENVSTOW_AGENT = '1'
          $masked = & $bin get OPENAI_API_KEY
          if ($masked -match $expected) { throw 'get leaked the value under an agent' }

          Write-Host 'windows smoke: OK'

  guardrails:
    name: guardrails (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
      - name: redact-guard behavior
        run: scripts/test-redact-guard.sh
